<h2>College Admission Form</h2>

<form><fieldset>

<legend align="center">Student Details</legend>

<label>Enter your First Name: <br>

<input type="text"><br>

<input type="text"><br>

<label>Enter your Last Name: <br></label>

<input type="text"><br>

<label>Enter your Mobile no.: <br></label>

<input type="number"><br>

<label>Enter your Email: <br></label>

<input type="email"><br>

<label>Enter Birth Date: <br></label>

<input type="number"><br>

<label>Select Gender: <br></label>

<input type="radio">Male<br>

<input type="radio">Female<br>

<label>Address:</label>

<textarea></textarea>

</fieldset>

<fieldset>

<select>

<option>SBC</option>

<option>OBC</option>

<option>minority</option>

<option>SC/ST</option>

</fieldset>

<fieldset>

<input type="text"><br>

<input type="text"><br>

<label>MHTCET Marks</label><br>

<input type="text"><br>

</fieldset>

<fieldset>

<label>Course</label><br>

<input type="checkbox">B.tech<br>

<input type="checkbox">MCA<br>

<input type="checkbox">B.Sc<br>

<input type="reset">

</fieldset>

</form>
